<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Orchid Pavilion — Staff Training</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --gold: #c9a96e;
  --gold-light: #e2c898;
  --gold-dim: rgba(201,169,110,0.15);
  --gold-border: rgba(201,169,110,0.22);
  --charcoal: #0f0e0d;
  --charcoal-2: #1a1917;
  --charcoal-3: #252320;
  --text-muted: rgba(201,169,110,0.5);
  --text-body: rgba(255,255,255,0.78);
  --error: #e07070;
  --success: #7ec8a0;
}

html, body { height: 100%; background: var(--charcoal); color: var(--gold); font-family: 'Inter', sans-serif; overflow: hidden; }

#app { height: 100vh; display: flex; flex-direction: column; align-items: center; }

#setup-screen {
  position: fixed; inset: 0; background: var(--charcoal);
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  padding: 24px; z-index: 100; overflow-y: auto;
}

.setup-logo { text-align: center; margin-bottom: 32px; }
.setup-logo .icon { font-size: 20px; margin-bottom: 10px; opacity: 0.7; }
.setup-logo h1 {
  font-family: 'Cormorant Garamond', serif;
  font-size: clamp(20px, 5vw, 28px);
  font-weight: 500; letter-spacing: 0.2em;
  color: var(--gold); text-transform: uppercase;
}
.setup-logo p { font-size: 10px; letter-spacing: 0.3em; text-transform: uppercase; color: var(--text-muted); margin-top: 4px; }

.setup-card {
  width: 100%; max-width: 420px;
  background: var(--charcoal-2);
  border: 1px solid rgba(201,169,110,0.12);
  border-radius: 3px; padding: 28px 24px;
}

.setup-card h2 {
  font-family: 'Cormorant Garamond', serif;
  font-size: 16px; font-weight: 400;
  letter-spacing: 0.1em; color: var(--gold);
  margin-bottom: 20px; text-align: center;
}

.field { margin-bottom: 16px; }
.field label { display: block; font-size: 9px; letter-spacing: 0.2em; text-transform: uppercase; color: var(--text-muted); margin-bottom: 6px; }
.field input, .field select {
  width: 100%; background: var(--charcoal-3);
  border: 1px solid rgba(201,169,110,0.15);
  border-radius: 2px; color: var(--gold-light);
  font-family: 'Inter', sans-serif; font-size: 12px;
  padding: 9px 11px; outline: none;
  transition: border-color 0.2s;
}
.field input:focus, .field select:focus { border-color: rgba(201,169,110,0.4); }
.field input::placeholder { color: rgba(201,169,110,0.22); }
.field select option { background: var(--charcoal-2); }

.lesson-grid {
  display: grid; grid-template-columns: 1fr 1fr;
  gap: 8px; margin-top: 6px;
}

.lesson-btn {
  background: var(--charcoal-3);
  border: 1px solid rgba(201,169,110,0.15);
  border-radius: 2px; padding: 10px 8px;
  cursor: pointer; text-align: left;
  transition: all 0.2s; color: var(--text-muted);
  font-family: 'Inter', sans-serif;
}
.lesson-btn:hover { border-color: rgba(201,169,110,0.4); color: var(--gold); }
.lesson-btn.selected { border-color: var(--gold); background: var(--gold-dim); color: var(--gold); }
.lesson-btn .lesson-num { font-size: 9px; letter-spacing: 0.15em; text-transform: uppercase; margin-bottom: 3px; opacity: 0.7; }
.lesson-btn .lesson-name { font-size: 11px; font-weight: 400; line-height: 1.4; }

.start-btn {
  width: 100%; margin-top: 20px;
  background: var(--gold); border: none; border-radius: 2px;
  color: var(--charcoal); font-family: 'Inter', sans-serif;
  font-size: 11px; font-weight: 500; letter-spacing: 0.2em;
  text-transform: uppercase; padding: 13px;
  cursor: pointer; transition: opacity 0.2s;
}
.start-btn:hover { opacity: 0.88; }
.start-btn:disabled { opacity: 0.35; cursor: not-allowed; }

header {
  width: 100%; text-align: center;
  padding: 18px 24px 14px;
  border-bottom: 1px solid rgba(201,169,110,0.08);
  flex-shrink: 0; background: var(--charcoal);
}
.orchid-icon { font-size: 13px; margin-bottom: 5px; opacity: 0.7; }
header h1 {
  font-family: 'Cormorant Garamond', serif;
  font-size: clamp(14px, 3.5vw, 19px); font-weight: 500;
  letter-spacing: 0.2em; color: var(--gold);
  text-transform: uppercase; margin-bottom: 2px;
}
.lesson-indicator { font-size: 9px; letter-spacing: 0.2em; text-transform: uppercase; color: var(--text-muted); }
.divider { width: 24px; height: 1px; background: linear-gradient(90deg,transparent,var(--gold),transparent); margin: 10px auto 0; }

#chat-scroll {
  flex: 1; width: 100%; max-width: 540px;
  overflow-y: auto; padding: 18px 16px 10px;
  display: flex; flex-direction: column; gap: 12px;
}
#chat-scroll::-webkit-scrollbar { width: 2px; }
#chat-scroll::-webkit-scrollbar-thumb { background: rgba(201,169,110,0.12); border-radius: 2px; }

.empty-state {
  flex: 1; display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  gap: 8px; opacity: 0.25; pointer-events: none;
}
.empty-state .ei { font-size: 22px; }
.empty-state p { font-family: 'Cormorant Garamond', serif; font-size: 13px; letter-spacing: 0.12em; color: var(--gold); }

.msg-row { display: flex; flex-direction: column; gap: 3px; animation: fadeUp 0.2s ease-out; }
.msg-row.user { align-items: flex-end; }
.msg-row.assistant { align-items: flex-start; }

@keyframes fadeUp { from { opacity:0; transform:translateY(6px);} to {opacity:1;transform:translateY(0);} }

.role-label { font-size: 8px; font-weight: 500; letter-spacing: 0.18em; text-transform: uppercase; color: var(--text-muted); padding: 0 3px; }

.bubble {
  max-width: 85%; padding: 10px 13px; border-radius: 2px;
  font-size: 13px; font-weight: 300; line-height: 1.7; letter-spacing: 0.02em;
}
.bubble.user { background: var(--gold-dim); border: 1px solid var(--gold-border); color: var(--gold-light); border-bottom-right-radius: 0; }
.bubble.assistant { background: var(--charcoal-3); border: 1px solid rgba(201,169,110,0.1); color: var(--text-body); border-bottom-left-radius: 0; }

.bubble-row { display: flex; align-items: flex-end; gap: 6px; }
.speak-btn {
  flex-shrink: 0; width: 24px; height: 24px;
  background: none; border: 1px solid rgba(201,169,110,0.2);
  border-radius: 50%; cursor: pointer; color: var(--text-muted);
  display: flex; align-items: center; justify-content: center;
  transition: all 0.2s; margin-bottom: 2px;
}
.speak-btn:hover { border-color: var(--gold); color: var(--gold); }
.speak-btn.playing { border-color: var(--gold); color: var(--gold); animation: pulse 1s ease infinite; }
@keyframes pulse { 0%,100%{opacity:1;} 50%{opacity:0.5;} }

.typing-indicator {
  display: flex; align-items: center; gap: 4px;
  padding: 11px 13px; background: var(--charcoal-3);
  border: 1px solid rgba(201,169,110,0.1); border-radius: 2px; border-bottom-left-radius: 0; width: fit-content;
}
.typing-dot { width: 4px; height: 4px; border-radius: 50%; background: var(--gold); animation: typingDot 1.2s ease infinite; }
.typing-dot:nth-child(2) { animation-delay:.16s; }
.typing-dot:nth-child(3) { animation-delay:.32s; }
@keyframes typingDot { 0%,80%,100%{opacity:.2;transform:translateY(0);} 40%{opacity:1;transform:translateY(-3px);} }

#input-panel {
  width: 100%; max-width: 540px; flex-shrink: 0;
  background: var(--charcoal-2);
  border-top: 1px solid rgba(201,169,110,0.1);
  padding: 14px 16px 20px;
}

.controls-row { display: flex; align-items: center; gap: 8px; margin-bottom: 12px; }

.toggle-track {
  display: flex; background: var(--charcoal-3);
  border: 1px solid rgba(201,169,110,0.15); border-radius: 2px; overflow: hidden; flex-shrink: 0;
}
.toggle-btn {
  padding: 5px 14px; font-family: 'Inter', sans-serif;
  font-size: 9px; font-weight: 500; letter-spacing: 0.16em;
  text-transform: uppercase; border: none; cursor: pointer;
  transition: all 0.2s; background: transparent; color: var(--text-muted);
}
.toggle-btn.active { background: var(--gold); color: var(--charcoal); }

.lang-select {
  flex: 1; background: var(--charcoal-3);
  border: 1px solid rgba(201,169,110,0.15); border-radius: 2px;
  color: var(--text-muted); font-family: 'Inter', sans-serif;
  font-size: 10px; padding: 5px 8px; cursor: pointer; outline: none; appearance: none;
}

.new-lesson-btn {
  background: none; border: 1px solid rgba(201,169,110,0.2);
  border-radius: 2px; color: var(--text-muted);
  font-family: 'Inter', sans-serif; font-size: 9px;
  letter-spacing: 0.12em; text-transform: uppercase;
  padding: 5px 10px; cursor: pointer; transition: all 0.2s; white-space: nowrap;
  flex-shrink: 0;
}
.new-lesson-btn:hover { border-color: var(--gold); color: var(--gold); }

#voice-ui { display: flex; flex-direction: column; align-items: center; }
#type-ui { display: none; }

.mic-wrapper {
  position: relative; width: 80px; height: 80px;
  display: flex; align-items: center; justify-content: center; margin-bottom: 4px;
}
.arc-svg { position: absolute; inset: 0; width: 100%; height: 100%; transform: rotate(-90deg); }
.mic-btn {
  position: relative; z-index: 2; width: 56px; height: 56px;
  border-radius: 50%; border: 1.5px solid rgba(201,169,110,0.3);
  background: transparent; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  outline: none; color: var(--gold); transition: all 0.3s;
}
.mic-btn:hover { border-color: var(--gold); background: var(--gold-dim); }
.mic-btn.recording { border-color: var(--gold); background: var(--gold-dim); color: var(--gold-light); }
.mic-btn:disabled { opacity: 0.35; cursor: not-allowed; }

.pulse-ring { position: absolute; inset: 0; border-radius: 50%; border: 1.5px solid var(--gold); animation: pulseRing 1.6s ease-out infinite; pointer-events: none; display: none; }
.pulse-ring.active { display: block; }
.pulse-ring:nth-child(2) { animation-delay: 0.55s; }
@keyframes pulseRing { 0%{transform:scale(1);opacity:.6;} 100%{transform:scale(1.5);opacity:0;} }

.countdown { font-family: 'Cormorant Garamond', serif; font-size: 11px; color: var(--text-muted); height: 15px; text-align: center; }

.waveform { width: 100%; height: 28px; display: flex; align-items: center; justify-content: center; gap: 2px; margin: 6px 0 2px; }
.wave-bar { width: 2px; border-radius: 2px; background: var(--gold); min-height: 3px; opacity: 0.15; transition: height 0.08s ease-out; }
.wave-bar.active { opacity: 1; }

.status-text { font-size: 10px; color: var(--text-muted); text-align: center; margin-top: 4px; min-height: 14px; letter-spacing: 0.06em; }
.status-text.error { color: var(--error); }

.try-again-btn { background: none; border: none; color: var(--gold); font-family: 'Inter', sans-serif; font-size: 10px; cursor: pointer; text-decoration: underline; margin-top: 4px; padding: 0; display: none; }

.type-row { display: flex; gap: 8px; align-items: flex-end; }
.text-input {
  flex: 1; background: var(--charcoal-3);
  border: 1px solid rgba(201,169,110,0.2); border-radius: 2px;
  color: var(--gold-light); font-family: 'Inter', sans-serif;
  font-size: 13px; font-weight: 300; line-height: 1.6;
  padding: 9px 11px; resize: none; outline: none;
  min-height: 40px; max-height: 100px; transition: border-color 0.2s;
}
.text-input::placeholder { color: rgba(201,169,110,0.2); }
.text-input:focus { border-color: rgba(201,169,110,0.4); }
.text-input:disabled { opacity: 0.4; }

.send-btn {
  width: 40px; height: 40px; flex-shrink: 0;
  background: var(--gold); border: 1px solid var(--gold);
  border-radius: 2px; color: var(--charcoal);
  cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all 0.2s;
}
.send-btn:disabled { background: transparent; border-color: rgba(201,169,110,0.2); color: var(--text-muted); cursor: not-allowed; }
</style>
</head>
<body>

<div id="setup-screen">
  <div class="setup-logo">
    <div class="icon">✦</div>
    <h1>The Orchid Pavilion</h1>
    <p>Staff English Training</p>
  </div>
  <div class="setup-card">
    <h2>Begin Your Training Session</h2>
    <div class="field">
      <label>Your Name</label>
      <input type="text" id="staff-name" placeholder="Enter your name..." />
    </div>
    <div class="field">
      <label>Anthropic API Key</label>
      <input type="password" id="anthropic-key" placeholder="sk-ant-..." />
    </div>
    <div class="field">
      <label>OpenAI API Key (for voice)</label>
      <input type="password" id="openai-key" placeholder="sk-proj-..." />
    </div>
    <div class="field">
      <label>Select Your Lesson</label>
      <div class="lesson-grid" id="lesson-grid"></div>
    </div>
    <button class="start-btn" id="start-btn" onclick="startSession()" disabled>Begin Session</button>
  </div>
</div>

<div id="main-app" style="display:none; width:100%; height:100%; flex-direction:column; align-items:center;">
  <header>
    <div class="orchid-icon">✦</div>
    <h1>The Orchid Pavilion</h1>
    <div class="lesson-indicator" id="lesson-indicator">Loading...</div>
    <div class="divider"></div>
  </header>
  <div id="chat-scroll">
    <div class="empty-state" id="empty-state">
      <div class="ei">✦</div>
      <p>Session starting...</p>
    </div>
  </div>
  <div id="input-panel">
    <div class="controls-row">
      <div class="toggle-track">
        <button class="toggle-btn active" id="btn-voice" onclick="setMode('voice')">Voice</button>
        <button class="toggle-btn" id="btn-type" onclick="setMode('type')">Type</button>
      </div>
      <select class="lang-select" id="lang-select">
        <option value="vi">Vietnamese</option>
        <option value="en">English</option>
        <option value="">Auto</option>
      </select>
      <button class="new-lesson-btn" onclick="newLesson()">New Lesson</button>
    </div>
    <div id="voice-ui">
      <div class="mic-wrapper">
        <div class="pulse-ring" id="pulse1"></div>
        <div class="pulse-ring" id="pulse2"></div>
        <svg class="arc-svg" viewBox="0 0 80 80" id="arc-svg">
          <circle cx="40" cy="40" r="35" fill="none" stroke="rgba(201,169,110,0.1)" stroke-width="1.5"/>
          <path id="arc-path" fill="none" stroke="#c9a96e" stroke-width="1.5" stroke-linecap="round" d=""/>
        </svg>
        <button class="mic-btn" id="mic-btn" onclick="handleMicClick()">
          <svg id="mic-icon" width="16" height="16" viewBox="0 0 24 24" fill="none">
            <rect x="9" y="2" width="6" height="12" rx="3" fill="currentColor"/>
            <path d="M5 10a7 7 0 0 0 14 0" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
            <line x1="12" y1="19" x2="12" y2="22" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
            <line x1="9" y1="22" x2="15" y2="22" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
          </svg>
        </button>
      </div>
      <div class="countdown" id="countdown"></div>
      <div class="waveform" id="waveform"></div>
      <div class="status-text" id="status-text">Tap the microphone to speak</div>
      <button class="try-again-btn" id="try-again-btn" onclick="resetVoice()">Try again</button>
    </div>
    <div id="type-ui">
      <div class="type-row">
        <textarea class="text-input" id="text-input" placeholder="Type your message..." rows="1"
          onkeydown="handleKeyDown(event)" oninput="autoResize(this)"></textarea>
        <button class="send-btn" id="send-btn" onclick="handleTypeSubmit()" disabled>
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none">
            <path d="M22 2L11 13" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
            <path d="M22 2L15 22L11 13L2 9L22 2Z" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </button>
      </div>
    </div>
  </div>
</div>

<script>
const LESSONS = [
  { id:'M1L1', module:1, lesson:1, name:'Welcoming Guests', focus:'Greet guests, check reservations, guide to table. Key vocab: menu, reservation, booth, high chair, cutlery, place setting.', brandOverrides:['NEVER say "Good evening, can I help you?" — ALWAYS say "Good evening. Welcome to The Orchid Pavilion. My name is [Name] and I will be taking care of you tonight."','NEVER say "Follow me" alone — ALWAYS say "Right this way, please."','When seating: "Here is your table. I hope you enjoy the view this evening. May I bring you still or sparkling water while you look over our menu?"'], viPronunciation:['reservation','pavilion','welcome'], phonetic:['res-er-VA-tion','pa-VIL-ion','WEL-come'] },
  { id:'M1L2', module:1, lesson:2, name:'Welcoming Guests (Extended)', focus:'Extended arrival phrases, handling missing reservations, offering alternatives. Phrases: "Welcome back! Lovely to see you.", "Could I take the name on your reservation?", "I wasn\'t able to find a booking under that name."', brandOverrides:['NEVER say "I can\'t find your booking" — ALWAYS say "I\'m afraid I\'m not able to locate that reservation. Would you mind if I just take one moment to check?"','NEVER say "Wait" — ALWAYS say "Just one moment, please."'], viPronunciation:['reservation','available','alternative'], phonetic:['res-er-VA-tion','a-VAIL-a-ble','al-TER-na-tive'] },
  { id:'M1L3', module:1, lesson:3, name:'Seating Guests', focus:'Seating preferences, wheelchair access, window seats, indoor/outdoor, wait times.', brandOverrides:['NEVER say "That table is taken" — ALWAYS say "I\'m afraid that table is currently occupied."','NEVER say "You\'ll have to wait" — ALWAYS say "The wait for that table is approximately [X] minutes. Shall I arrange a drink for you at the bar while you wait?"'], viPronunciation:['wheelchair','outdoor','preference'], phonetic:['WHEEL-chair','OUT-door','PREF-er-ence'] },
  { id:'M1L4', module:1, lesson:4, name:'Small Talk With Guests', focus:'Light conversation: weather, local sights, celebrations, returning guests.', brandOverrides:['Small talk must feel natural and warm — never scripted or rushed.','ALWAYS listen to the guest\'s answer and respond genuinely before moving on.','If a guest mentions a celebration: "Congratulations! Please allow us to make this evening extra special for you."'], viPronunciation:['celebrating','anniversary','visiting'], phonetic:['SEL-e-brate-ing','an-NIV-er-sa-ry','VIS-it-ing'] },
  { id:'M2L1', module:2, lesson:1, name:'Offering the Menu', focus:'Presenting menus, offering drinks first, describing specials.', brandOverrides:['ALWAYS offer still or sparkling water immediately on seating: "May I bring you still or sparkling water while you look over our menu?"','When describing specials, use sensory language.','NEVER say "Do you want to order?" — ALWAYS say "Are you ready to order, or would you like a few more minutes?"'], viPronunciation:['sparkling','menu','special'], phonetic:['SPAR-kling','MEN-you','SPESH-al'] },
  { id:'M2L2', module:2, lesson:2, name:'Taking Food Orders', focus:'Starters, mains, sides, dietary preferences, steak doneness. Brand menu: Seared Scallops, Crispy Sea Bass, Slow-Roasted Lamb, Fresh Truffle Pasta, Grilled Lobster Thermidor.', brandOverrides:['ALWAYS describe dishes using: [Protein] + [Cooking Method] + [Texture/Flavor].','Lobster Thermidor upsell: "The Grilled Lobster Thermidor is our signature dish — many guests tell us it is the finest lobster they have had in Vietnam."','NEVER say "Good choice" — ALWAYS say "Excellent choice" or "A wonderful selection."'], viPronunciation:['scallops','truffle','lobster'], phonetic:['SKAL-opz','TRUF-ul','LOB-ster'] },
  { id:'M2L3', module:2, lesson:3, name:'Taking Drink Orders', focus:'Water, wine, beer, cocktails, hot drinks. Wine pairing, upselling to a bottle.', brandOverrides:['Wine pairing: "May I suggest a glass of our Sancerre Blanc? It pairs beautifully with the Seared Scallops."','Bottle upsell: "Since you\'re both having wine this evening, a bottle would be a wonderful value."','NEVER say "We don\'t have that wine" — ALWAYS say "I\'m afraid that wine is no longer available. May I suggest something equally lovely?"'], viPronunciation:['sparkling','Sancerre','champagne'], phonetic:['SPAR-kling','san-SAIR','sham-PAIN'] },
  { id:'M2L4', module:2, lesson:4, name:'Confirming the Order', focus:'Repeating orders back clearly, checking for errors, special requests.', brandOverrides:['ALWAYS confirm the full order before leaving the table.','For special requests: "Of course. I will personally ensure the kitchen is aware."','After confirming: "Thank you. I will have that with you shortly."'], viPronunciation:['confirm','certainly','absolutely'], phonetic:['con-FIRM','SER-ten-lee','ab-SO-lute-lee'] },
  { id:'M3L1', module:3, lesson:1, name:'Dietary Requirements', focus:'Allergies, vegan, vegetarian, gluten-free, halal, nut-free.', brandOverrides:['NEVER guess about allergies. ALWAYS say: "I want to give you completely accurate information. Please allow me one moment to check with our chef."','For allergies: "We take food allergies very seriously at The Orchid Pavilion."','NEVER say "I think it\'s okay" — say "Let me confirm with the kitchen to be absolutely certain."'], viPronunciation:['vegetarian','allergy','gluten'], phonetic:['vej-e-TAIR-ee-an','AL-er-jee','GLOO-ten'] },
  { id:'M3L3', module:3, lesson:3, name:'Responding to Complaints', focus:'The 5-Step Recovery Protocol: Acknowledge, Act, Return, Follow up, Escalate.', brandOverrides:['Step 1: "I completely understand, and I sincerely apologise. That is not the standard we hold at The Orchid Pavilion."','Step 2: "Please allow me to speak with our chef personally. I will return to you in just a few moments."','Step 3: "Thank you so much for your patience. We are preparing a fresh [dish] for you right now."','NEVER say "Sorry, sorry!" — ALWAYS say "I sincerely apologise for the inconvenience."'], viPronunciation:['apologise','inconvenience','patience'], phonetic:['a-POL-o-jize','in-con-VEE-nee-ence','PAY-shence'] },
  { id:'M4L1', module:4, lesson:1, name:'Presenting the Bill', focus:'Presenting bill politely, split payments, contactless, receipt. Dessert upsell before bill.', brandOverrides:['Dessert upsell: "Before I bring your bill, may I tempt you with our Crème Brûlée? The caramel is torched at your table."','NEVER say "Here\'s your bill" abruptly — ALWAYS say "Whenever you are ready, I have your bill here for you."'], viPronunciation:['receipt','contactless','brûlée'], phonetic:['re-SEET','CON-tact-less','broo-LAY'] },
  { id:'M4L4', module:4, lesson:4, name:'Professional Farewells', focus:'Warm goodbyes, encouraging return visits.', brandOverrides:['NEVER say "Bye bye!" — ALWAYS say "Thank you for dining with us. We hope to welcome you again soon."','NEVER say "No problem" — ALWAYS say "It was my pleasure."','For special occasions: "It was truly an honour to be part of your celebration this evening."'], viPronunciation:['pleasure','honour','welcome'], phonetic:['PLEZH-er','ON-er','WEL-come'] }
];

let anthropicKey = localStorage.getItem('op_anthropic') || '';
let openaiKey = localStorage.getItem('op_openai') || '';
let staffName = localStorage.getItem('op_name') || '';
let selectedLesson = null;
let chatHistory = [];
let recordState = 'idle';
let elapsed = 0;
let mediaRecorder = null;
let chunks = [];
let timerInterval = null;
let animFrame = null;
let stream = null;
let audioCtx = null;
let analyser = null;
let isWaiting = false;
let waveBarEls = [];
let currentAudio = null;
const MAX_SECONDS = 45;

function buildLessonGrid() {
  const grid = document.getElementById('lesson-grid');
  grid.innerHTML = '';
  LESSONS.forEach(lesson => {
    const btn = document.createElement('button');
    btn.className = 'lesson-btn';
    btn.dataset.id = lesson.id;
    btn.innerHTML = `<div class="lesson-num">M${lesson.module} · L${lesson.lesson}</div><div class="lesson-name">${lesson.name}</div>`;
    btn.onclick = () => selectLesson(lesson.id, btn);
    grid.appendChild(btn);
  });
}

function selectLesson(id, btn) {
  document.querySelectorAll('.lesson-btn').forEach(b => b.classList.remove('selected'));
  btn.classList.add('selected');
  selectedLesson = LESSONS.find(l => l.id === id);
  checkStartReady();
}

function checkStartReady() {
  const name = document.getElementById('staff-name').value.trim();
  const ant = document.getElementById('anthropic-key').value.trim();
  const oai = document.getElementById('openai-key').value.trim();
  document.getElementById('start-btn').disabled = !name || !ant || !oai || !selectedLesson;
}

['staff-name','anthropic-key','openai-key'].forEach(id => {
  document.getElementById(id).addEventListener('input', checkStartReady);
});

function startSession() {
  staffName = document.getElementById('staff-name').value.trim();
  anthropicKey = document.getElementById('anthropic-key').value.trim();
  openaiKey = document.getElementById('openai-key').value.trim();
  localStorage.setItem('op_anthropic', anthropicKey);
  localStorage.setItem('op_openai', openaiKey);
  localStorage.setItem('op_name', staffName);
  document.getElementById('setup-screen').style.display = 'none';
  const mainApp = document.getElementById('main-app');
  mainApp.style.display = 'flex';
  document.getElementById('lesson-indicator').textContent = `Module ${selectedLesson.module} · Lesson ${selectedLesson.lesson} — ${selectedLesson.name}`;
  buildWaveform();
  beginLesson();
}

function newLesson() {
  chatHistory = [];
  document.getElementById('chat-scroll').innerHTML = '<div class="empty-state" id="empty-state"><div class="ei">✦</div><p>Session starting...</p></div>';
  document.getElementById('setup-screen').style.display = 'flex';
  document.getElementById('main-app').style.display = 'none';
  selectedLesson = null;
  document.querySelectorAll('.lesson-btn').forEach(b => b.classList.remove('selected'));
  checkStartReady();
}

function buildSystemPrompt(lesson) {
  return `You are an English language tutor for The Orchid Pavilion restaurant in Da Nang, Vietnam. You are coaching ${staffName}, a Vietnamese hospitality staff member.

CURRENT LESSON: Module ${lesson.module}, Lesson ${lesson.lesson} — "${lesson.name}"

LESSON CONTENT TO TEACH:
${lesson.focus}

BRAND STANDARD OVERRIDES (these take priority over general English):
${lesson.brandOverrides.map((r,i) => `${i+1}. ${r}`).join('\n')}

COACHING STYLE — VERY IMPORTANT:
- Be warm, encouraging, and conversational. Move at a good pace.
- Only correct the most important error per turn.
- Use: Validate first, then correct gently, then ask them to try once.
- If their English is clearly understood even with minor errors, praise the communication first.
- Do NOT make the student repeat the same phrase more than twice. Move on after two attempts.
- Keep responses concise — 2-4 short paragraphs maximum.
- Make it feel like a friendly practice session, not an exam.

PHONETIC COACHING (for Vietnamese speakers):
- Watch for: dropping final consonants (s, d, t, b), replacing 'r' with 'l', replacing 'tr' with 'ch', flat word stress.
- Target words for this lesson: ${lesson.viPronunciation.map((w,i) => `"${w}" = ${lesson.phonetic[i]}`).join(', ')}

SESSION STRUCTURE:
1. Warm welcome using ${staffName}'s name. Briefly explain what this lesson covers.
2. Run through 2-3 key phrases or role-play scenarios.
3. Keep momentum — praise and move forward quickly when they get something right.
4. End with: "Let's finish with our Vietnamese pronunciation challenge for today!" then drill: ${lesson.viPronunciation.join(', ')}.

BRAND VOICE:
- FORBIDDEN: "What do you want?", "You want that?", "Wait a moment", "Bye bye!", "Sorry sorry!", "No problem", "Is everything okay?"
- REQUIRED: "May I help you?", "Certainly", "Just one moment, please", "It was my pleasure", "Thank you for dining with us", "I sincerely apologise"

Student messages may come from voice transcription — focus on meaning, not spelling errors.`;
}

async function callClaude(userMessage) {
  const messages = userMessage
    ? [...chatHistory, { role:'user', content:userMessage }]
    : [{ role:'user', content:`Hello, I am ready to begin Module ${selectedLesson.module}, Lesson ${selectedLesson.lesson}.` }];
  const res = await fetch('https://api.anthropic.com/v1/messages', {
    method:'POST',
    headers:{ 'Content-Type':'application/json', 'x-api-key':anthropicKey, 'anthropic-version':'2023-06-01', 'anthropic-dangerous-direct-browser-access':'true' },
    body:JSON.stringify({ model:'claude-sonnet-4-20250514', max_tokens:800, system:buildSystemPrompt(selectedLesson), messages })
  });
  if (!res.ok) throw new Error(`API ${res.status}`);
  return (await res.json()).content[0].text;
}

async function speakText(text, btnEl) {
  if (currentAudio) { currentAudio.pause(); currentAudio = null; }
  document.querySelectorAll('.speak-btn.playing').forEach(b => b.classList.remove('playing'));
  if (btnEl) btnEl.classList.add('playing');
  try {
    const clean = text.replace(/[✦✧★]/g,'').replace(/\*\*/g,'').trim();
    const res = await fetch('https://api.openai.com/v1/audio/speech', {
      method:'POST',
      headers:{ 'Authorization':`Bearer ${openaiKey}`, 'Content-Type':'application/json' },
      body:JSON.stringify({ model:'tts-1', voice:'nova', input:clean, speed:0.92 })
    });
    if (!res.ok) throw new Error('TTS failed');
    const url = URL.createObjectURL(await res.blob());
    currentAudio = new Audio(url);
    currentAudio.onended = () => { if (btnEl) btnEl.classList.remove('playing'); currentAudio = null; };
    currentAudio.play();
  } catch(e) { if (btnEl) btnEl.classList.remove('playing'); }
}

async function beginLesson() {
  setWaiting(true); showTyping();
  try {
    const reply = await callClaude('');
    hideTyping();
    const msgEl = addMessage('assistant', reply);
    chatHistory.push({ role:'user', content:`Hello, I am ready to begin Module ${selectedLesson.module}, Lesson ${selectedLesson.lesson}.` });
    chatHistory.push({ role:'assistant', content:reply });
    speakText(reply, msgEl.querySelector('.speak-btn'));
  } catch(e) {
    hideTyping();
    addMessage('assistant', `Hello ${staffName}! Welcome to your training session for ${selectedLesson.name}. Let's get started!`);
  }
  setWaiting(false);
}

async function sendMessage(userText) {
  if (!userText.trim() || isWaiting) return;
  addMessage('user', userText);
  chatHistory.push({ role:'user', content:userText });
  setWaiting(true); showTyping();
  try {
    const reply = await callClaude(userText);
    hideTyping();
    const msgEl = addMessage('assistant', reply);
    chatHistory.push({ role:'assistant', content:reply });
    speakText(reply, msgEl.querySelector('.speak-btn'));
  } catch(e) { hideTyping(); addMessage('assistant', 'Something went wrong. Please try again.'); }
  setWaiting(false); resetVoice();
}

function addMessage(role, content) {
  const empty = document.getElementById('empty-state');
  if (empty) empty.remove();
  const scroll = document.getElementById('chat-scroll');
  const row = document.createElement('div');
  row.className = `msg-row ${role}`;
  if (role === 'assistant') {
    const speakBtn = document.createElement('button');
    speakBtn.className = 'speak-btn';
    speakBtn.title = 'Listen';
    speakBtn.innerHTML = `<svg width="10" height="10" viewBox="0 0 24 24" fill="none"><polygon points="5,3 19,12 5,21" fill="currentColor"/></svg>`;
    row.innerHTML = `<div class="role-label">Orchid Pavilion</div><div class="bubble-row"></div>`;
    const br = row.querySelector('.bubble-row');
    const bubble = document.createElement('div');
    bubble.className = 'bubble assistant';
    bubble.innerHTML = escHtml(content);
    speakBtn.onclick = () => speakText(content, speakBtn);
    br.appendChild(bubble); br.appendChild(speakBtn);
  } else {
    row.innerHTML = `<div class="role-label">You</div><div class="bubble user">${escHtml(content)}</div>`;
  }
  scroll.appendChild(row); scroll.scrollTop = scroll.scrollHeight;
  return row;
}

function escHtml(t) { return t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>'); }

function showTyping() {
  const scroll = document.getElementById('chat-scroll');
  const empty = document.getElementById('empty-state');
  if (empty) empty.style.display = 'none';
  const el = document.createElement('div');
  el.className = 'msg-row assistant'; el.id = 'typing-row';
  el.innerHTML = `<div class="role-label">Orchid Pavilion</div><div class="typing-indicator"><div class="typing-dot"></div><div class="typing-dot"></div><div class="typing-dot"></div></div>`;
  scroll.appendChild(el); scroll.scrollTop = scroll.scrollHeight;
}

function hideTyping() { const el = document.getElementById('typing-row'); if (el) el.remove(); }

function setWaiting(val) {
  isWaiting = val;
  document.getElementById('mic-btn').disabled = val;
  document.getElementById('text-input').disabled = val;
  document.getElementById('send-btn').disabled = val || !document.getElementById('text-input').value.trim();
  if (!val && recordState === 'idle') setStatus('Tap the microphone to speak');
}

function setStatus(msg, isError) {
  const el = document.getElementById('status-text');
  el.textContent = msg; el.className = 'status-text' + (isError ? ' error' : '');
}

function setMode(m) {
  document.getElementById('voice-ui').style.display = m==='voice' ? 'flex' : 'none';
  document.getElementById('type-ui').style.display = m==='type' ? 'block' : 'none';
  document.getElementById('btn-voice').classList.toggle('active', m==='voice');
  document.getElementById('btn-type').classList.toggle('active', m==='type');
}

function buildWaveform() {
  const wf = document.getElementById('waveform'); wf.innerHTML = ''; waveBarEls = [];
  for (let i=0; i<24; i++) { const b=document.createElement('div'); b.className='wave-bar'; b.style.height='3px'; wf.appendChild(b); waveBarEls.push(b); }
}

function startWaveform(s) {
  audioCtx = new AudioContext();
  const src = audioCtx.createMediaStreamSource(s);
  analyser = audioCtx.createAnalyser(); analyser.fftSize=64;
  src.connect(analyser);
  const data = new Uint8Array(analyser.frequencyBinCount);
  const tick = () => { analyser.getByteFrequencyData(data); waveBarEls.forEach((b,i)=>{ const v=data[Math.floor(i*data.length/waveBarEls.length)]||0; b.style.height=Math.max(3,(v/255)*26)+'px'; b.classList.add('active'); }); animFrame=requestAnimationFrame(tick); };
  tick();
}

function stopWaveform() { if (animFrame) cancelAnimationFrame(animFrame); waveBarEls.forEach(b=>{b.style.height='3px';b.classList.remove('active');}); }

function updateArc(pct) {
  if (pct<=0){document.getElementById('arc-path').setAttribute('d','');return;}
  const r=35,cx=40,cy=40,angle=pct*2*Math.PI,x=cx+r*Math.cos(angle-Math.PI/2),y=cy+r*Math.sin(angle-Math.PI/2);
  document.getElementById('arc-path').setAttribute('d',`M ${cx} ${cy-r} A ${r} ${r} 0 ${pct>.5?1:0} 1 ${x} ${y}`);
}

function handleMicClick() { if(isWaiting)return; if(recordState==='recording')stopRecording(); else if(recordState==='idle'||recordState==='error')startRecording(); }

async function startRecording() {
  chunks=[];elapsed=0;updateArc(0);
  document.getElementById('try-again-btn').style.display='none';
  try {
    stream = await navigator.mediaDevices.getUserMedia({audio:true});
    startWaveform(stream);
    mediaRecorder = new MediaRecorder(stream);
    mediaRecorder.ondataavailable = e=>{if(e.data.size>0)chunks.push(e.data);};
    mediaRecorder.onstop = async()=>{await transcribeAndSend(new Blob(chunks,{type:'audio/webm'}));};
    mediaRecorder.start(); recordState='recording';
    document.getElementById('mic-btn').classList.add('recording');
    document.getElementById('mic-icon').innerHTML=`<rect x="6" y="4" width="4" height="16" rx="1" fill="currentColor"/><rect x="14" y="4" width="4" height="16" rx="1" fill="currentColor"/>`;
    document.getElementById('pulse1').classList.add('active');
    document.getElementById('pulse2').classList.add('active');
    timerInterval=setInterval(()=>{elapsed++;document.getElementById('countdown').textContent=`${MAX_SECONDS-elapsed}s`;updateArc(elapsed/MAX_SECONDS);if(elapsed>=MAX_SECONDS)stopRecording();},1000);
    setStatus('');
  } catch(e){recordState='error';setStatus('Microphone access denied.',true);document.getElementById('try-again-btn').style.display='block';}
}

function stopRecording() {
  if(timerInterval)clearInterval(timerInterval); stopWaveform();
  if(stream){stream.getTracks().forEach(t=>t.stop());stream=null;}
  if(audioCtx){audioCtx.close();audioCtx=null;}
  if(mediaRecorder&&mediaRecorder.state!=='inactive')mediaRecorder.stop();
  document.getElementById('mic-btn').classList.remove('recording');
  document.getElementById('mic-icon').innerHTML=`<rect x="9" y="2" width="6" height="12" rx="3" fill="currentColor"/><path d="M5 10a7 7 0 0 0 14 0" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/><line x1="12" y1="19" x2="12" y2="22" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/><line x1="9" y1="22" x2="15" y2="22" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>`;
  document.getElementById('pulse1').classList.remove('active');
  document.getElementById('pulse2').classList.remove('active');
  document.getElementById('countdown').textContent='';
}

async function transcribeAndSend(blob) {
  recordState='transcribing'; setStatus('Transcribing...'); document.getElementById('mic-btn').disabled=true;
  try {
    const lang=document.getElementById('lang-select').value;
    const fd=new FormData(); fd.append('file',blob,'audio.webm'); fd.append('model','whisper-1'); if(lang)fd.append('language',lang);
    const res=await fetch('https://api.openai.com/v1/audio/transcriptions',{method:'POST',headers:{Authorization:`Bearer ${openaiKey}`},body:fd});
    if(!res.ok)throw new Error(`Whisper ${res.status}`);
    const transcript=((await res.json()).text||'').trim();
    if(!transcript){recordState='error';setStatus('No speech detected.',true);document.getElementById('try-again-btn').style.display='block';document.getElementById('mic-btn').disabled=false;return;}
    recordState='done'; setStatus(''); await sendMessage(transcript);
  } catch(e){recordState='error';setStatus('Transcription failed. Check your OpenAI key.',true);document.getElementById('try-again-btn').style.display='block';document.getElementById('mic-btn').disabled=false;}
}

function resetVoice() { recordState='idle';elapsed=0;updateArc(0);document.getElementById('countdown').textContent='';document.getElementById('try-again-btn').style.display='none';document.getElementById('mic-btn').disabled=false;stopWaveform();if(!isWaiting)setStatus('Tap the microphone to speak'); }

function handleTypeSubmit() { const input=document.getElementById('text-input');const text=input.value.trim();if(!text||isWaiting)return;input.value='';autoResize(input);document.getElementById('send-btn').disabled=true;sendMessage(text); }
function handleKeyDown(e){if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();handleTypeSubmit();}}
function autoResize(el){el.style.height='auto';el.style.height=Math.min(el.scrollHeight,100)+'px';document.getElementById('send-btn').disabled=!el.value.trim()||isWaiting;}

buildLessonGrid();
if(anthropicKey)document.getElementById('anthropic-key').value=anthropicKey;
if(openaiKey)document.getElementById('openai-key').value=openaiKey;
if(staffName)document.getElementById('staff-name').value=staffName;
checkStartReady();
</script>
</body>
</html>
