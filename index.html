<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Orchid Pavilion — Staff Training</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #f5f2ee; --bg-2: #ffffff; --bg-3: #ede9e3; --bg-4: #e4dfd7;
  --accent: #2d6a4f; --accent-2: #40916c; --accent-light: #d8f3dc;
  --accent-dim: rgba(45,106,79,0.1); --text: #1a1a1a; --text-2: #444;
  --text-muted: #888; --border: rgba(0,0,0,0.08); --border-2: rgba(0,0,0,0.14);
  --error: #c0392b; --warning: #e67e22; --success: #27ae60;
  --shadow: 0 2px 12px rgba(0,0,0,0.06); --shadow-lg: 0 4px 24px rgba(0,0,0,0.1);
}

html, body { height: 100%; background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; overflow: hidden; }

#setup-screen { position: fixed; inset: 0; background: var(--bg); display: flex; flex-direction: column; align-items: center; justify-content: flex-start; padding: 32px 20px 40px; z-index: 100; overflow-y: auto; }

.setup-logo { text-align: center; margin-bottom: 28px; }
.setup-logo .leaf { font-size: 28px; margin-bottom: 8px; display: block; }
.setup-logo h1 { font-family: 'DM Serif Display', serif; font-size: clamp(22px, 5vw, 30px); font-weight: 400; color: var(--accent); }
.setup-logo p { font-size: 11px; letter-spacing: 0.18em; text-transform: uppercase; color: var(--text-muted); margin-top: 4px; }

.setup-card { width: 100%; max-width: 440px; background: var(--bg-2); border: 1px solid var(--border); border-radius: 12px; padding: 28px 24px; box-shadow: var(--shadow-lg); }
.setup-card h2 { font-family: 'DM Serif Display', serif; font-size: 17px; font-weight: 400; color: var(--text); margin-bottom: 22px; text-align: center; }

.field { margin-bottom: 14px; }
.field label { display: block; font-size: 11px; font-weight: 500; letter-spacing: 0.08em; text-transform: uppercase; color: var(--text-muted); margin-bottom: 5px; }
.field input { width: 100%; background: var(--bg); border: 1px solid var(--border-2); border-radius: 8px; color: var(--text); font-family: 'DM Sans', sans-serif; font-size: 13px; padding: 10px 12px; outline: none; transition: border-color 0.2s; }
.field input:focus { border-color: var(--accent); }
.field input::placeholder { color: var(--text-muted); }

.lesson-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 7px; margin-top: 6px; }
.lesson-btn { background: var(--bg); border: 1px solid var(--border-2); border-radius: 8px; padding: 10px; cursor: pointer; text-align: left; transition: all 0.18s; color: var(--text-2); font-family: 'DM Sans', sans-serif; }
.lesson-btn:hover { border-color: var(--accent); background: var(--accent-dim); }
.lesson-btn.selected { border-color: var(--accent); background: var(--accent-dim); color: var(--accent); }
.lesson-btn .lesson-num { font-size: 9px; font-weight: 600; letter-spacing: 0.12em; text-transform: uppercase; margin-bottom: 2px; opacity: 0.65; }
.lesson-btn .lesson-name { font-size: 11px; font-weight: 400; line-height: 1.35; }

.start-btn { width: 100%; margin-top: 18px; background: var(--accent); border: none; border-radius: 8px; color: #fff; font-family: 'DM Sans', sans-serif; font-size: 13px; font-weight: 500; padding: 13px; cursor: pointer; transition: background 0.2s; }
.start-btn:hover { background: var(--accent-2); }
.start-btn:disabled { background: var(--bg-4); color: var(--text-muted); cursor: not-allowed; }

#main-app { width: 100%; height: 100vh; display: none; flex-direction: column; align-items: center; background: var(--bg); }

header { width: 100%; background: var(--bg-2); border-bottom: 1px solid var(--border); padding: 12px 20px 12px; flex-shrink: 0; display: flex; flex-direction: column; align-items: center; gap: 8px; box-shadow: 0 1px 4px rgba(0,0,0,0.04); }
.header-top { display: flex; align-items: center; gap: 10px; }
.header-leaf { font-size: 18px; }
.header-titles h1 { font-family: 'DM Serif Display', serif; font-size: 16px; font-weight: 400; color: var(--accent); line-height: 1.2; text-align: center; }
.header-titles .lesson-tag { font-size: 10px; font-weight: 500; letter-spacing: 0.1em; text-transform: uppercase; color: var(--text-muted); margin-top: 1px; text-align: center; }
.new-lesson-btn { width: 100%; max-width: 320px; background: none; border: 1.5px solid var(--accent); border-radius: 6px; color: var(--accent); font-family: 'DM Sans', sans-serif; font-size: 12px; font-weight: 600; padding: 7px 12px; cursor: pointer; transition: all 0.2s; letter-spacing: 0.04em; }
.new-lesson-btn:hover { background: var(--accent); color: #fff; }

#pronun-bar { width: 100%; max-width: 600px; flex-shrink: 0; background: var(--accent-light); border-bottom: 1px solid rgba(45,106,79,0.15); padding: 10px 16px; display: none; }
.pronun-bar-inner { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
.pronun-label { font-size: 10px; font-weight: 600; letter-spacing: 0.1em; text-transform: uppercase; color: var(--accent); flex-shrink: 0; }
.pronun-words { display: flex; gap: 6px; flex-wrap: wrap; }
.pronun-word { background: var(--bg-2); border: 1.5px solid var(--border-2); border-radius: 20px; padding: 4px 12px; font-size: 12px; font-weight: 500; color: var(--text); cursor: pointer; transition: all 0.18s; }
.pronun-word:hover { border-color: var(--accent); color: var(--accent); }
.pronun-word.playing-word { border-color: var(--accent); background: var(--accent-dim); color: var(--accent); }
.pronun-hint { font-size: 10px; color: var(--text-muted); font-style: italic; }

#chat-scroll { flex: 1; width: 100%; max-width: 600px; overflow-y: auto; padding: 20px 16px 12px; display: flex; flex-direction: column; gap: 14px; }
#chat-scroll::-webkit-scrollbar { width: 3px; }
#chat-scroll::-webkit-scrollbar-thumb { background: var(--bg-4); border-radius: 3px; }

.empty-state { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 8px; opacity: 0.4; pointer-events: none; padding: 40px 0; }
.empty-state span { font-size: 32px; }
.empty-state p { font-family: 'DM Serif Display', serif; font-size: 15px; color: var(--text-muted); }

.msg-row { display: flex; flex-direction: column; gap: 3px; animation: fadeUp 0.2s ease-out; }
.msg-row.user { align-items: flex-end; }
.msg-row.assistant { align-items: flex-start; }
@keyframes fadeUp { from{opacity:0;transform:translateY(6px);}to{opacity:1;transform:translateY(0);} }

.role-label { font-size: 9px; font-weight: 600; letter-spacing: 0.14em; text-transform: uppercase; color: var(--text-muted); padding: 0 4px; }
.bubble { max-width: 84%; padding: 11px 14px; border-radius: 12px; font-size: 13.5px; font-weight: 400; line-height: 1.65; color: var(--text); }
.bubble.user { background: var(--accent); color: #fff; border-bottom-right-radius: 3px; }
.bubble.assistant { background: var(--bg-2); border: 1px solid var(--border); border-bottom-left-radius: 3px; box-shadow: var(--shadow); }

.bubble-row { display: flex; align-items: flex-end; gap: 6px; }
.speak-btn { flex-shrink: 0; width: 26px; height: 26px; background: var(--bg-2); border: 1px solid var(--border-2); border-radius: 50%; cursor: pointer; color: var(--text-muted); display: flex; align-items: center; justify-content: center; transition: all 0.2s; margin-bottom: 1px; box-shadow: var(--shadow); }
.speak-btn:hover { border-color: var(--accent); color: var(--accent); }
.speak-btn.playing { border-color: var(--accent); color: var(--accent); background: var(--accent-dim); }

.thinking-row { display: flex; flex-direction: column; align-items: flex-start; gap: 3px; }
.thinking-bubble { background: var(--bg-2); border: 1px solid var(--border); border-radius: 12px; border-bottom-left-radius: 3px; padding: 12px 16px; box-shadow: var(--shadow); display: flex; align-items: center; gap: 8px; }
.thinking-text { font-size: 12px; color: var(--text-muted); font-style: italic; }
.thinking-dots { display: flex; gap: 3px; }
.t-dot { width: 5px; height: 5px; border-radius: 50%; background: var(--accent); opacity: 0.3; animation: tDot 1.2s ease infinite; }
.t-dot:nth-child(2){animation-delay:.2s;} .t-dot:nth-child(3){animation-delay:.4s;}
@keyframes tDot{0%,80%,100%{opacity:0.2;transform:scale(1);}40%{opacity:1;transform:scale(1.2);}}

#input-panel { width: 100%; max-width: 600px; flex-shrink: 0; background: var(--bg-2); border-top: 1px solid var(--border); padding: 12px 16px 20px; box-shadow: 0 -2px 8px rgba(0,0,0,0.04); }
.mode-row { display: flex; align-items: center; gap: 8px; margin-bottom: 10px; }
.toggle-track { display: flex; background: var(--bg-3); border: 1px solid var(--border-2); border-radius: 8px; overflow: hidden; flex-shrink: 0; }
.toggle-btn { padding: 6px 16px; font-family: 'DM Sans', sans-serif; font-size: 11px; font-weight: 500; border: none; cursor: pointer; transition: all 0.18s; background: transparent; color: var(--text-muted); }
.toggle-btn.active { background: var(--accent); color: #fff; border-radius: 7px; }

#voice-ui { display: flex; flex-direction: column; align-items: center; padding: 4px 0; }
#type-ui { display: none; }

.mic-outer { position: relative; width: 76px; height: 76px; display: flex; align-items: center; justify-content: center; margin-bottom: 4px; }
.arc-svg { position: absolute; inset: 0; width: 100%; height: 100%; transform: rotate(-90deg); }
.mic-btn { position: relative; z-index: 2; width: 54px; height: 54px; border-radius: 50%; border: 2px solid var(--border-2); background: var(--bg-2); cursor: pointer; display: flex; align-items: center; justify-content: center; outline: none; color: var(--accent); transition: all 0.25s; box-shadow: var(--shadow); }
.mic-btn:hover { border-color: var(--accent); background: var(--accent-dim); }
.mic-btn.recording { border-color: var(--error); background: #fdf0f0; color: var(--error); box-shadow: 0 0 0 6px rgba(192,57,43,0.08); }
.mic-btn:disabled { opacity: 0.38; cursor: not-allowed; box-shadow: none; }

.pulse-ring { position: absolute; inset: 0; border-radius: 50%; border: 2px solid var(--error); animation: pRing 1.6s ease-out infinite; pointer-events: none; display: none; }
.pulse-ring.on { display: block; }
.pulse-ring:nth-child(2){animation-delay:.55s;}
@keyframes pRing{0%{transform:scale(1);opacity:.5;}100%{transform:scale(1.55);opacity:0;}}

.countdown { font-size: 11px; color: var(--text-muted); height: 15px; text-align: center; font-weight: 500; }
.waveform { width: 100%; height: 26px; display: flex; align-items: center; justify-content: center; gap: 2px; margin: 5px 0 2px; }
.wave-bar { width: 2.5px; border-radius: 3px; background: var(--accent); min-height: 3px; opacity: 0.2; transition: height 0.08s ease-out; }
.wave-bar.on { opacity: 1; }
.status-text { font-size: 11px; color: var(--text-muted); text-align: center; margin-top: 3px; min-height: 15px; }
.status-text.err { color: var(--error); }
.try-again-btn { background: none; border: none; color: var(--accent); font-family: 'DM Sans', sans-serif; font-size: 11px; cursor: pointer; text-decoration: underline; margin-top: 3px; padding: 0; display: none; font-weight: 500; }

.type-row { display: flex; gap: 8px; align-items: flex-end; }
.text-input { flex: 1; background: var(--bg); border: 1px solid var(--border-2); border-radius: 10px; color: var(--text); font-family: 'DM Sans', sans-serif; font-size: 13px; line-height: 1.55; padding: 10px 13px; resize: none; outline: none; min-height: 42px; max-height: 100px; transition: border-color 0.2s; }
.text-input:focus { border-color: var(--accent); }
.text-input::placeholder { color: var(--text-muted); }
.text-input:disabled { opacity: 0.4; }
.send-btn { width: 42px; height: 42px; flex-shrink: 0; background: var(--accent); border: none; border-radius: 10px; color: #fff; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all 0.2s; }
.send-btn:hover { background: var(--accent-2); }
.send-btn:disabled { background: var(--bg-4); color: var(--text-muted); cursor: not-allowed; }
</style>
</head>
<body>

<div id="setup-screen">
  <div class="setup-logo">
    <span class="leaf">🌿</span>
    <h1>The Orchid Pavilion</h1>
    <p>Staff English Training</p>
  </div>
  <div class="setup-card">
    <h2>Begin Your Training Session</h2>
    <div class="field"><label>Your Name</label><input type="text" id="staff-name" placeholder="Enter your name..." /></div>
    <div class="field"><label>Anthropic API Key</label><input type="password" id="anthropic-key" placeholder="sk-ant-..." /></div>
    <div class="field"><label>OpenAI API Key (voice)</label><input type="password" id="openai-key" placeholder="sk-proj-..." /></div>
    <div class="field"><label>Select Your Lesson</label><div class="lesson-grid" id="lesson-grid"></div></div>
    <button class="start-btn" id="start-btn" onclick="startSession()" disabled>Begin Session</button>
  </div>
</div>

<div id="main-app">
  <header>
    <div class="header-top">
      <div class="header-leaf">🌿</div>
      <div class="header-titles">
        <h1>The Orchid Pavilion</h1>
        <div class="lesson-tag" id="lesson-tag">Loading...</div>
      </div>
    </div>
    <button class="new-lesson-btn" onclick="newLesson()">↩ Change Lesson</button>
  </header>

  <div id="pronun-bar">
    <div class="pronun-bar-inner">
      <span class="pronun-label">🎯 Pronunciation</span>
      <div class="pronun-words" id="pronun-words"></div>
      <span class="pronun-hint">Tap a word to hear the correct pronunciation</span>
    </div>
  </div>

  <div id="chat-scroll">
    <div class="empty-state" id="empty-state"><span>🌿</span><p>Starting your session...</p></div>
  </div>

  <div id="input-panel">
    <div class="mode-row">
      <div class="toggle-track">
        <button class="toggle-btn active" id="btn-voice" onclick="setMode('voice')">Voice</button>
        <button class="toggle-btn" id="btn-type" onclick="setMode('type')">Type</button>
      </div>
    </div>
    <div id="voice-ui">
      <div class="mic-outer">
        <div class="pulse-ring" id="p1"></div>
        <div class="pulse-ring" id="p2"></div>
        <svg class="arc-svg" viewBox="0 0 76 76">
          <circle cx="38" cy="38" r="33" fill="none" stroke="var(--bg-3)" stroke-width="2"/>
          <path id="arc-path" fill="none" stroke="var(--accent)" stroke-width="2" stroke-linecap="round" d=""/>
        </svg>
        <button class="mic-btn" id="mic-btn" onclick="handleMicClick()">
          <svg id="mic-icon" width="18" height="18" viewBox="0 0 24 24" fill="none">
            <rect x="9" y="2" width="6" height="12" rx="3" fill="currentColor"/>
            <path d="M5 10a7 7 0 0 0 14 0" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
            <line x1="12" y1="19" x2="12" y2="22" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
            <line x1="9" y1="22" x2="15" y2="22" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
          </svg>
        </button>
      </div>
      <div class="countdown" id="countdown"></div>
      <div class="waveform" id="waveform"></div>
      <div class="status-text" id="status-text">Tap the microphone to speak</div>
      <button class="try-again-btn" id="try-again-btn" onclick="resetVoice()">Try again</button>
    </div>
    <div id="type-ui">
      <div class="type-row">
        <textarea class="text-input" id="text-input" placeholder="Type your message..." rows="1"
          onkeydown="handleKeyDown(event)" oninput="autoResize(this)"></textarea>
        <button class="send-btn" id="send-btn" onclick="handleTypeSubmit()" disabled>
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none">
            <path d="M22 2L11 13" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
            <path d="M22 2L15 22L11 13L2 9L22 2Z" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </button>
      </div>
    </div>
  </div>
</div>

<script>
const LESSONS = [
  { id:'M1L1', module:1, lesson:1, name:'Welcoming Guests', focus:'Greeting guests on arrival, checking reservations, guiding to the table. Key vocabulary: menu, reservation, booth, high chair, cutlery, place setting, water jug.', brandOverrides:['Standard greeting: "Good evening. Welcome to The Orchid Pavilion. My name is [Name] and I will be taking care of you tonight. Do you have a reservation with us this evening?" — NOT "Good evening, can I help you?"','When leading guests: "Right this way, please." — NOT just "Follow me"','When seating: "Here is your table. I hope you enjoy the view this evening. May I bring you still or sparkling water while you look over our menu?"'], viPronunciation:['reservation','pavilion','welcome'], phonetic:['res-er-VA-tion','pa-VIL-ion','WEL-kum'] },
  { id:'M1L2', module:1, lesson:2, name:'Welcoming Guests (Extended)', focus:'Extended arrival phrases, handling missing reservations politely, offering seating alternatives.', brandOverrides:['Missing reservation: "I am afraid I am not able to locate that reservation. Would you mind if I take just one moment to check?" — NEVER say "I cannot find your booking"','Offering alternatives: "We have a table available at the bar, or one opening shortly in the dining room."','NEVER say "Wait" alone — ALWAYS say "Just one moment, please."'], viPronunciation:['reservation','available','alternative'], phonetic:['res-er-VA-tion','a-VAIL-a-bul','al-TER-na-tiv'] },
  { id:'M1L3', module:1, lesson:3, name:'Seating Guests', focus:'Seating preferences, wheelchair access, window seats, indoor and outdoor seating, wait times, special requests.', brandOverrides:['Occupied table: "I am afraid that table is currently occupied." — NEVER say "That table is taken"','Wait time: "The wait for that table is approximately 20 minutes. May I arrange a drink for you at the bar while you wait?"','Seating confirmation: "Here is your table. Please let me know if you would prefer a different position."'], viPronunciation:['wheelchair','available','preference'], phonetic:['WHEEL-chair','a-VAIL-a-bul','PREF-er-ens'] },
  { id:'M1L4', module:1, lesson:4, name:'Small Talk With Guests', focus:'Light polite conversation: weather, local sights, visits from out of town, celebrations, returning guests.', brandOverrides:['Small talk must feel genuinely warm — never scripted or rushed','ALWAYS listen and respond to the guest answer before moving on','For celebrations: "Congratulations! Please allow us to make this evening extra special for you."','For returning guests: "Welcome back! It is wonderful to see you again."'], viPronunciation:['celebrating','anniversary','visiting'], phonetic:['SEL-e-bray-ting','an-NIV-er-sree','VIZ-it-ing'] },
  { id:'M2L1', module:2, lesson:1, name:'Offering the Menu', focus:'Presenting menus, offering drinks on arrival, describing daily specials using sensory language.', brandOverrides:['Water on arrival: "May I bring you still or sparkling water while you look over our menu?" — this must happen immediately on seating','Describing specials: use sensory words — flaky, moist, delicate, rich, crispy','Asking to order: "Are you ready to order, or would you like a few more minutes?" — NEVER "Do you want to order?"'], viPronunciation:['sparkling','special','menu'], phonetic:['SPAR-kling','SPESH-ul','MEN-yoo'] },
  { id:'M2L2', module:2, lesson:2, name:'Taking Food Orders', focus:'Starters, mains, sides, cooking preferences. Brand menu: Seared Scallops, Crispy Soft-Shell Crab, Fresh Truffle Bruschetta, Crispy Sea Bass, Slow-Roasted Lamb Shoulder, Fresh Truffle Pasta, Grilled Lobster Thermidor.', brandOverrides:['Dish description formula: protein + cooking method + texture or flavor','Lobster Thermidor upsell: "The Grilled Lobster Thermidor is our signature dish. Many guests tell us it is the finest lobster they have had in Vietnam."','Order acknowledgement: "Excellent choice" or "A wonderful selection" — NEVER just "Good choice"'], viPronunciation:['scallops','truffle','lobster'], phonetic:['SKAL-ups','TRUF-ul','LOB-ster'] },
  { id:'M2L3', module:2, lesson:3, name:'Taking Drink Orders', focus:'Water, wine, beer, cocktails, hot beverages. Wine pairing language, upselling to a bottle.', brandOverrides:['Wine pairing: "May I suggest a glass of our Sancerre Blanc? It pairs beautifully with the Seared Scallops."','Bottle upsell: "Since you are both enjoying wine this evening, a bottle would be wonderful value. Shall I bring one to the table?"','Unavailable wine: "I am afraid that wine is no longer available. May I suggest something equally lovely?"'], viPronunciation:['sparkling','Sancerre','champagne'], phonetic:['SPAR-kling','san-SAIR','sham-PAIN'] },
  { id:'M2L4', module:2, lesson:4, name:'Confirming the Order', focus:'Repeating the full order back clearly before leaving the table. Confirming special requests and modifications.', brandOverrides:['ALWAYS confirm the complete order before leaving the table','Special requests: "Of course. I will personally ensure the kitchen is fully aware."','After confirming: "Thank you. I will have everything with you shortly."'], viPronunciation:['confirm','certainly','absolutely'], phonetic:['kun-FIRM','SUR-ten-lee','ab-SO-loot-lee'] },
  { id:'M3L1', module:3, lesson:1, name:'Dietary Requirements', focus:'Allergies, vegan, vegetarian, gluten-free, halal, nut-free, lactose intolerant.', brandOverrides:['Allergy response: "I want to give you completely accurate information. Please allow me one moment to check with our chef." — NEVER guess','Preparing the dish: "We take food allergies very seriously at The Orchid Pavilion. Your dish will be prepared in a dedicated area."','NEVER say "I think it is okay" — always confirm with the kitchen first'], viPronunciation:['vegetarian','allergy','gluten'], phonetic:['vej-e-TAIR-ee-un','AL-er-jee','GLOO-ten'] },
  { id:'M3L2', module:3, lesson:2, name:'Handling Special Requests', focus:'Modifications to orders, substitutions, additions, removing ingredients, sauce on the side.', brandOverrides:['For substitutions: "Certainly, I would be happy to arrange that for you."','If unsure: "Let me check with the kitchen to ensure we can do that perfectly for you."','Upcharge: "Yes, we can do that. There is a small additional charge of [amount]. Is that quite alright?"'], viPronunciation:['substitute','certainly','preference'], phonetic:['SUB-stit-yoot','SUR-ten-lee','PREF-er-ens'] },
  { id:'M3L3', module:3, lesson:3, name:'Responding to Complaints', focus:'The 5-Step Recovery Protocol: Acknowledge, Act, Return, Follow up, Escalate.', brandOverrides:['Step 1: "I completely understand, and I sincerely apologise. That is not the standard we hold at The Orchid Pavilion."','Step 2: "Please allow me to speak with our chef personally. I will return to you in just a few moments."','Step 3: "Thank you so much for your patience. We are preparing a fresh dish for you right now. It will be with you in approximately [specific time]."','NEVER say "Sorry, sorry!" — ALWAYS say "I sincerely apologise for the inconvenience."'], viPronunciation:['apologise','inconvenience','patience'], phonetic:['a-POL-o-jize','in-kun-VEEN-yens','PAY-shens'] },
  { id:'M3L4', module:3, lesson:4, name:'Ensuring Guest Satisfaction', focus:'Checking in after serving food and after resolving problems. Following up at the right moment.', brandOverrides:['Check-in: "How is everything tasting for you this evening?" — NEVER "Is everything okay?"','After complaint resolution: "I wanted to personally check that everything is to your satisfaction. It truly means a great deal to us."','Return within 5 minutes of a replacement dish being served'], viPronunciation:['satisfaction','personally','wonderful'], phonetic:['sat-is-FAK-shun','PUR-sun-a-lee','WUN-der-ful'] },
  { id:'M4L1', module:4, lesson:1, name:'Presenting the Bill', focus:'Presenting the bill politely, split payments, contactless, receipts. Dessert upsell before the bill.', brandOverrides:['Dessert upsell: "Before I bring your bill, may I tempt you with our Creme Brulee? The caramel sugar is torched fresh at your table."','Presenting the bill: "Whenever you are ready, I have your bill here for you." — NEVER just say "Here is your bill"','NEVER ask "Do you want dessert?" — always offer something specific with a description'], viPronunciation:['receipt','contactless','brulee'], phonetic:['re-SEET','KON-takt-les','broo-LAY'] },
  { id:'M4L2', module:4, lesson:2, name:'Handling Payment Issues', focus:'Card declined, incorrect bill, cash payments. Professional language for handling payment problems discreetly.', brandOverrides:['Card declined: "I am sorry, it appears the card did not go through. Would you like to try another card, or would cash be more convenient?"','Bill query: "Of course. Let me double-check the total for you right away."','After resolving: "Thank you so much for your patience. Everything is now in order."'], viPronunciation:['payment','declined','apologise'], phonetic:['PAY-ment','de-KLIND','a-POL-o-jize'] },
  { id:'M4L3', module:4, lesson:3, name:'Receiving Feedback', focus:'Responding to positive and critical feedback professionally.', brandOverrides:['Positive feedback: "That is so wonderful to hear. I will make sure to pass your kind words to the entire team."','Critical feedback: "Thank you sincerely for letting us know. We always want to do better, and your honesty truly helps us improve."','NEVER be defensive about critical feedback — treat it as a gift'], viPronunciation:['feedback','appreciate','improve'], phonetic:['FEED-bak','a-PREE-shee-ate','im-PROOV'] },
  { id:'M4L4', module:4, lesson:4, name:'Professional Farewells', focus:'Warm professional goodbyes that leave a lasting positive impression. Encouraging return visits.', brandOverrides:['Standard farewell: "Thank you for dining with us. We hope to welcome you again very soon." — NEVER say "Bye bye!"','Response to thanks: "It was my pleasure." — NEVER say "No problem"','For special occasions: "It was truly an honour to be part of your celebration this evening."'], viPronunciation:['pleasure','honour','farewell'], phonetic:['PLEZH-er','ON-er','FAIR-wel'] }
];

let anthropicKey = localStorage.getItem('op_ant') || '';
let openaiKey = localStorage.getItem('op_oai') || '';
let staffName = localStorage.getItem('op_name') || '';
let selectedLesson = null, chatHistory = [], recordState = 'idle', elapsed = 0;
let mediaRecorder = null, chunks = [], timerInterval = null, animFrame = null;
let stream = null, audioCtx = null, analyser = null, isWaiting = false;
let waveBarEls = [], currentAudio = null;
const MAX_SECS = 45;

function buildLessonGrid() {
  const grid = document.getElementById('lesson-grid');
  grid.innerHTML = '';
  LESSONS.forEach(l => {
    const btn = document.createElement('button');
    btn.className = 'lesson-btn';
    btn.innerHTML = `<div class="lesson-num">M${l.module} · L${l.lesson}</div><div class="lesson-name">${l.name}</div>`;
    btn.onclick = () => { document.querySelectorAll('.lesson-btn').forEach(b=>b.classList.remove('selected')); btn.classList.add('selected'); selectedLesson=l; checkReady(); };
    grid.appendChild(btn);
  });
}

function checkReady() {
  const ok = document.getElementById('staff-name').value.trim() && document.getElementById('anthropic-key').value.trim() && document.getElementById('openai-key').value.trim() && selectedLesson;
  document.getElementById('start-btn').disabled = !ok;
}

['staff-name','anthropic-key','openai-key'].forEach(id => document.getElementById(id).addEventListener('input', checkReady));

function startSession() {
  staffName = document.getElementById('staff-name').value.trim();
  anthropicKey = document.getElementById('anthropic-key').value.trim();
  openaiKey = document.getElementById('openai-key').value.trim();
  localStorage.setItem('op_ant', anthropicKey);
  localStorage.setItem('op_oai', openaiKey);
  localStorage.setItem('op_name', staffName);
  document.getElementById('setup-screen').style.display = 'none';
  document.getElementById('main-app').style.display = 'flex';
  document.getElementById('lesson-tag').textContent = `M${selectedLesson.module} · L${selectedLesson.lesson} — ${selectedLesson.name}`;
  buildWaveform(); buildPronunBar(); beginLesson();
}

function newLesson() {
  stopTTS(); chatHistory = [];
  document.getElementById('chat-scroll').innerHTML = '<div class="empty-state" id="empty-state"><span>🌿</span><p>Starting your session...</p></div>';
  document.getElementById('setup-screen').style.display = 'flex';
  document.getElementById('main-app').style.display = 'none';
  selectedLesson = null;
  document.querySelectorAll('.lesson-btn').forEach(b=>b.classList.remove('selected'));
  checkReady();
}

function buildPronunBar() {
  const bar = document.getElementById('pronun-bar');
  const wordsEl = document.getElementById('pronun-words');
  bar.style.display = 'block'; wordsEl.innerHTML = '';
  selectedLesson.viPronunciation.forEach((word) => {
    const span = document.createElement('span');
    span.className = 'pronun-word';
    span.textContent = word;
    span.title = 'Tap to hear';
    span.onclick = () => playPronunciation(word, span);
    wordsEl.appendChild(span);
  });
}

async function playPronunciation(word, el) {
  if (el.classList.contains('playing-word')) return;
  document.querySelectorAll('.pronun-word').forEach(w => w.classList.remove('playing-word'));
  el.classList.add('playing-word');
  try {
    const res = await fetch('https://api.openai.com/v1/audio/speech', {
      method: 'POST',
      headers: { 'Authorization': `Bearer ${openaiKey}`, 'Content-Type': 'application/json' },
      body: JSON.stringify({ model: 'tts-1', voice: 'nova', input: word, speed: 0.75 })
    });
    if (res.ok) {
      const url = URL.createObjectURL(await res.blob());
      const audio = new Audio(url);
      audio.onended = () => el.classList.remove('playing-word');
      audio.onerror = () => el.classList.remove('playing-word');
      audio.play();
    } else { el.classList.remove('playing-word'); }
  } catch(e) { el.classList.remove('playing-word'); }
}

function buildSystemPrompt(lesson) {
  return `You are an English language tutor for The Orchid Pavilion restaurant in Da Nang, Vietnam. You are coaching ${staffName} one-to-one.

CURRENT LESSON: Module ${lesson.module}, Lesson ${lesson.lesson} — ${lesson.name}

LESSON CONTENT:
${lesson.focus}

BRAND STANDARD DIFFERENCES — always explain clearly when The Orchid Pavilion uses different phrasing from standard English. Say: "In general English you might say X, but at The Orchid Pavilion we always say Y."
${lesson.brandOverrides.map((r,i)=>`${i+1}. ${r}`).join('\n')}

COACHING STYLE:
- Warm, friendly, encouraging. Like a helpful colleague, not an examiner.
- Keep responses short — 2 to 3 sentences maximum per turn.
- Start by introducing the lesson topic in one sentence, then ask if the student has any questions before you begin practice. Wait for their response.
- After their questions, guide them gently through 2 to 3 practice scenarios.
- Only correct one error per response. Praise first.
- Never make the student repeat the same phrase more than twice. Move on with encouragement.
- Write in plain natural sentences only. No bullet points, no bold text, no asterisks, no markdown of any kind.
- The pronunciation target words appear as tap buttons above the chat — do not drill them in the main conversation.

PHONETIC NOTES FOR VIETNAMESE SPEAKERS:
Watch for: dropping final consonants (s, d, t, b), replacing r with l, replacing tr with ch, flat unstressed rhythm. Correct gently.

BRAND VOICE:
Never say: "What do you want", "You want that", "Wait a moment", "Bye bye", "Sorry sorry", "No problem", "Is everything okay"
Always use: "May I help you", "Certainly", "Just one moment please", "It was my pleasure", "Thank you for dining with us", "I sincerely apologise"

Student messages may come from voice transcription. Focus on meaning, not spelling.`;
}

function stripMarkdown(text) {
  return text.replace(/\*\*/g,'').replace(/\*/g,'').replace(/_/g,'')
    .replace(/#{1,6}\s/g,'').replace(/`/g,'').replace(/\[([^\]]+)\]\([^\)]+\)/g,'$1').trim();
}

function stopTTS() {
  if (currentAudio) { currentAudio.pause(); currentAudio = null; }
  document.querySelectorAll('.speak-btn.playing').forEach(b=>b.classList.remove('playing'));
}

async function speakText(text, btnEl) {
  stopTTS();
  if (btnEl) btnEl.classList.add('playing');
  try {
    const res = await fetch('https://api.openai.com/v1/audio/speech', {
      method:'POST',
      headers:{'Authorization':`Bearer ${openaiKey}`,'Content-Type':'application/json'},
      body:JSON.stringify({model:'tts-1',voice:'nova',input:stripMarkdown(text),speed:1.0})
    });
    if (!res.ok) throw new Error('TTS failed');
    const url = URL.createObjectURL(await res.blob());
    currentAudio = new Audio(url);
    currentAudio.onended = () => { if (btnEl) btnEl.classList.remove('playing'); currentAudio=null; };
    currentAudio.play();
  } catch(e) { if (btnEl) btnEl.classList.remove('playing'); }
}

async function callClaude(userMessage) {
  const messages = userMessage
    ? [...chatHistory, {role:'user',content:userMessage}]
    : [{role:'user',content:`Hello, I am ready to begin Module ${selectedLesson.module} Lesson ${selectedLesson.lesson}.`}];
  const res = await fetch('https://api.anthropic.com/v1/messages', {
    method:'POST',
    headers:{'Content-Type':'application/json','x-api-key':anthropicKey,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},
    body:JSON.stringify({model:'claude-haiku-4-5-20251001',max_tokens:180,system:buildSystemPrompt(selectedLesson),messages})
  });
  if (!res.ok) throw new Error(`API ${res.status}`);
  return (await res.json()).content[0].text;
}

async function beginLesson() {
  setWaiting(true); showThinking();
  try {
    const reply = await callClaude('');
    hideThinking();
    const msgEl = addMessage('assistant', reply);
    chatHistory.push({role:'user',content:`Hello, I am ready to begin Module ${selectedLesson.module} Lesson ${selectedLesson.lesson}.`});
    chatHistory.push({role:'assistant',content:reply});
    speakText(reply, msgEl.querySelector('.speak-btn'));
  } catch(e) {
    hideThinking();
    addMessage('assistant', `Hello ${staffName}! Welcome to ${selectedLesson.name}. Do you have any questions before we begin?`);
  }
  setWaiting(false);
}

async function sendMessage(userText) {
  if (!userText.trim() || isWaiting) return;
  addMessage('user', userText);
  chatHistory.push({role:'user',content:userText});
  setWaiting(true); showThinking();
  try {
    const reply = await callClaude(userText);
    hideThinking();
    const msgEl = addMessage('assistant', reply);
    chatHistory.push({role:'assistant',content:reply});
    speakText(reply, msgEl.querySelector('.speak-btn'));
  } catch(e) { hideThinking(); addMessage('assistant','Something went wrong. Please try again.'); }
  setWaiting(false); resetVoice();
}

function addMessage(role, content) {
  const empty = document.getElementById('empty-state');
  if (empty) empty.remove();
  const scroll = document.getElementById('chat-scroll');
  const row = document.createElement('div');
  row.className = `msg-row ${role}`;
  if (role === 'assistant') {
    const speakBtn = document.createElement('button');
    speakBtn.className = 'speak-btn'; speakBtn.title = 'Replay';
    speakBtn.innerHTML = `<svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 .49-3.8"/></svg>`;
    speakBtn.onclick = () => speakText(content, speakBtn);
    row.innerHTML = `<div class="role-label">Orchid Pavilion</div><div class="bubble-row"></div>`;
    const br = row.querySelector('.bubble-row');
    const bubble = document.createElement('div');
    bubble.className = 'bubble assistant'; bubble.textContent = content;
    br.appendChild(bubble); br.appendChild(speakBtn);
  } else {
    row.innerHTML = `<div class="role-label">You</div>`;
    const bubble = document.createElement('div');
    bubble.className = 'bubble user'; bubble.textContent = content;
    row.appendChild(bubble);
  }
  scroll.appendChild(row); scroll.scrollTop = scroll.scrollHeight;
  return row;
}

function showThinking() {
  const scroll = document.getElementById('chat-scroll');
  const empty = document.getElementById('empty-state');
  if (empty) empty.style.display = 'none';
  const el = document.createElement('div');
  el.className = 'thinking-row'; el.id = 'thinking-row';
  el.innerHTML = `<div class="role-label">Orchid Pavilion</div><div class="thinking-bubble"><div class="thinking-text">Thinking</div><div class="thinking-dots"><div class="t-dot"></div><div class="t-dot"></div><div class="t-dot"></div></div></div>`;
  scroll.appendChild(el); scroll.scrollTop = scroll.scrollHeight;
}

function hideThinking() { const el=document.getElementById('thinking-row'); if(el)el.remove(); }

function setWaiting(val) {
  isWaiting = val;
  document.getElementById('mic-btn').disabled = val;
  document.getElementById('text-input').disabled = val;
  document.getElementById('send-btn').disabled = val || !document.getElementById('text-input').value.trim();
  if (!val && recordState==='idle') setStatus('Tap the microphone to speak');
}

function setStatus(msg, isErr) { const el=document.getElementById('status-text'); el.textContent=msg; el.className='status-text'+(isErr?' err':''); }

function setMode(m) {
  document.getElementById('voice-ui').style.display = m==='voice'?'flex':'none';
  document.getElementById('type-ui').style.display = m==='type'?'block':'none';
  document.getElementById('btn-voice').classList.toggle('active',m==='voice');
  document.getElementById('btn-type').classList.toggle('active',m==='type');
}

function buildWaveform() {
  const wf=document.getElementById('waveform'); wf.innerHTML=''; waveBarEls=[];
  for(let i=0;i<24;i++){const b=document.createElement('div');b.className='wave-bar';b.style.height='3px';wf.appendChild(b);waveBarEls.push(b);}
}

function startWaveform(s) {
  audioCtx=new AudioContext();
  const src=audioCtx.createMediaStreamSource(s);
  analyser=audioCtx.createAnalyser();analyser.fftSize=64;src.connect(analyser);
  const data=new Uint8Array(analyser.frequencyBinCount);
  const tick=()=>{analyser.getByteFrequencyData(data);waveBarEls.forEach((b,i)=>{const v=data[Math.floor(i*data.length/waveBarEls.length)]||0;b.style.height=Math.max(3,(v/255)*24)+'px';b.classList.add('on');});animFrame=requestAnimationFrame(tick);};
  tick();
}

function stopWaveform(){if(animFrame)cancelAnimationFrame(animFrame);waveBarEls.forEach(b=>{b.style.height='3px';b.classList.remove('on');});}

function updateArc(pct){
  if(pct<=0){document.getElementById('arc-path').setAttribute('d','');return;}
  const r=33,cx=38,cy=38,angle=pct*2*Math.PI,x=cx+r*Math.cos(angle-Math.PI/2),y=cy+r*Math.sin(angle-Math.PI/2);
  document.getElementById('arc-path').setAttribute('d',`M ${cx} ${cy-r} A ${r} ${r} 0 ${pct>.5?1:0} 1 ${x} ${y}`);
}

function handleMicClick(){if(isWaiting)return;if(recordState==='recording')stopRecording();else if(recordState==='idle'||recordState==='error')startRecording();}

async function startRecording(){
  chunks=[];elapsed=0;updateArc(0);
  document.getElementById('try-again-btn').style.display='none';
  try{
    stream=await navigator.mediaDevices.getUserMedia({audio:true});
    startWaveform(stream);
    mediaRecorder=new MediaRecorder(stream);
    mediaRecorder.ondataavailable=e=>{if(e.data.size>0)chunks.push(e.data);};
    mediaRecorder.onstop=async()=>{await transcribeAndSend(new Blob(chunks,{type:'audio/webm'}));};
    mediaRecorder.start();recordState='recording';
    document.getElementById('mic-btn').classList.add('recording');
    document.getElementById('mic-icon').innerHTML=`<rect x="6" y="4" width="4" height="16" rx="1" fill="currentColor"/><rect x="14" y="4" width="4" height="16" rx="1" fill="currentColor"/>`;
    document.getElementById('p1').classList.add('on');document.getElementById('p2').classList.add('on');
    timerInterval=setInterval(()=>{elapsed++;document.getElementById('countdown').textContent=`${MAX_SECS-elapsed}s`;updateArc(elapsed/MAX_SECS);if(elapsed>=MAX_SECS)stopRecording();},1000);
    setStatus('');
  }catch(e){recordState='error';setStatus('Microphone access denied.',true);document.getElementById('try-again-btn').style.display='block';}
}

function stopRecording(){
  if(timerInterval)clearInterval(timerInterval);stopWaveform();
  if(stream){stream.getTracks().forEach(t=>t.stop());stream=null;}
  if(audioCtx){audioCtx.close();audioCtx=null;}
  if(mediaRecorder&&mediaRecorder.state!=='inactive')mediaRecorder.stop();
  document.getElementById('mic-btn').classList.remove('recording');
  document.getElementById('mic-icon').innerHTML=`<rect x="9" y="2" width="6" height="12" rx="3" fill="currentColor"/><path d="M5 10a7 7 0 0 0 14 0" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/><line x1="12" y1="19" x2="12" y2="22" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/><line x1="9" y1="22" x2="15" y2="22" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>`;
  document.getElementById('p1').classList.remove('on');document.getElementById('p2').classList.remove('on');
  document.getElementById('countdown').textContent='';
}

async function transcribeAndSend(blob){
  recordState='transcribing';setStatus('Transcribing...');document.getElementById('mic-btn').disabled=true;
  try{
    const fd=new FormData();fd.append('file',blob,'audio.webm');fd.append('model','whisper-1');fd.append('language','en');
    const res=await fetch('https://api.openai.com/v1/audio/transcriptions',{method:'POST',headers:{Authorization:`Bearer ${openaiKey}`},body:fd});
    if(!res.ok)throw new Error(`Whisper ${res.status}`);
    const transcript=((await res.json()).text||'').trim();
    if(!transcript){recordState='error';setStatus('No speech detected.',true);document.getElementById('try-again-btn').style.display='block';document.getElementById('mic-btn').disabled=false;return;}
    recordState='done';setStatus('');
    await sendMessage(transcript);
  }catch(e){recordState='error';setStatus('Transcription failed. Check your OpenAI key.',true);document.getElementById('try-again-btn').style.display='block';document.getElementById('mic-btn').disabled=false;}
}

function resetVoice(){recordState='idle';elapsed=0;updateArc(0);document.getElementById('countdown').textContent='';document.getElementById('try-again-btn').style.display='none';document.getElementById('mic-btn').disabled=false;stopWaveform();if(!isWaiting)setStatus('Tap the microphone to speak');}

function handleTypeSubmit(){const input=document.getElementById('text-input');const text=input.value.trim();if(!text||isWaiting)return;input.value='';autoResize(input);document.getElementById('send-btn').disabled=true;sendMessage(text);}
function handleKeyDown(e){if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();handleTypeSubmit();}}
function autoResize(el){el.style.height='auto';el.style.height=Math.min(el.scrollHeight,100)+'px';document.getElementById('send-btn').disabled=!el.value.trim()||isWaiting;}

buildLessonGrid();
if(anthropicKey)document.getElementById('anthropic-key').value=anthropicKey;
if(openaiKey)document.getElementById('openai-key').value=openaiKey;
if(staffName)document.getElementById('staff-name').value=staffName;
checkReady();
</script>
